services:
  - type: web
    name: tutem-backend
    env: python
    buildCommand: pip install -r backend/legacy/requirements.txt && pip install gunicorn
    startCommand: cd backend/legacy && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 10000
      # Fotos: GIT_AUTO_COMMIT vem true por defeito no código (commit local ao gravar upload).
      # No Render normalmente não existe .git no runtime — o commit só corre onde o servidor
      # tenha o repositório clonado (ex.: desenvolvimento local).
      # Push automático (opcional): GIT_AUTO_PUSH=true + credenciais (SSH ou token) no ambiente.
      # Commit sem user.name local: GIT_COMMITTER_NAME + GIT_COMMITTER_EMAIL
      # Fotos no GitHub (Render): GITHUB_TOKEN (secret) + GITHUB_REPO=owner/repo [+ GITHUB_BRANCH]
      # Repo privado e img no browser: PLAYER_PHOTO_USE_RENDER_URL=true
      # Adicione suas variáveis de ambiente aqui
      # - key: GOOGLE_APPLICATION_CREDENTIALS
      #   value: /opt/render/project/src/backend/legacy/service-account.json
